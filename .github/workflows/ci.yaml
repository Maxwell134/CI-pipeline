name: CI Pipeline

on:
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/hello-python
  IMAGE_TAG: ${{ github.sha }}
  ALLOWED_ACTORS: "tridibbasumatary,github-actions[bot]"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: write

    steps:
      - name: Validate allowed actor
        run: |
          allowed=false
          IFS=',' read -ra ACTORS <<< "${{ env.ALLOWED_ACTORS }}"
          for actor in "${ACTORS[@]}"; do
            if [ "$actor" = "${{ github.actor }}" ]; then
              allowed=true
              break
            fi
          done
          if [ "$allowed" != "true" ]; then
            echo "Actor '${{ github.actor }}' is not allowed to run this workflow."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate Docker username secret
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "DOCKER_USERNAME secret is not set."
            exit 1
          fi

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      # ✅ Save image so next job can use it
      - name: Save Docker image
        run: |
          docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  # 🔒 Scan job (before push)
  trivy-scan:
    needs: build
    uses: ./.github/workflows/trivy.yaml
    permissions:
      contents: read
      actions: read
    with:
      image_tag: ${{ github.sha }}
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}

  # 🚀 Push only if scan passes
  push:
    needs: trivy-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read

    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}