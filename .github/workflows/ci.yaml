name: CI Pipeline

on:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set image metadata
        id: meta
        run: |
          echo "image_name=${{ secrets.DOCKER_USERNAME }}/hello-python" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }} .

      # ✅ Save image so next job can use it
      - name: Save Docker image
        run: |
          docker save ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  # 🔒 Scan job (before push)
  trivy-scan:
    needs: build
    uses: ./.github/workflows/trivy.yml
    with:
      image_name: ${{ needs.build.outputs.image_name }}
      image_tag: ${{ needs.build.outputs.image_tag }}

  # 🚀 Push only if scan passes
  push:
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push ${{ needs.trivy-scan.inputs.image_name }}:${{ needs.trivy-scan.inputs.image_tag }}