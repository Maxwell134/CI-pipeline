name: CI Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.11]

    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    # Set image name + tag (OUTPUT)
    - name: Set image metadata
      id: meta
      run: |
        IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/hello-python
        IMAGE_TAG=${{ github.sha }}
        echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
        echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

    # Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # Install dependencies
    - name: Install dependencies
      run: pip install -r requirements.txt
      if: ${{ hashFiles('requirements.txt') != '' }}

    # Run app (basic test)
    - name: Run app
      run: python3 app.py

    # Build Docker image
    - name: Build Docker image
      run: |
        docker build -t ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }} .

    # 🔒 Trivy Scan
    - name: scan docker images 
      needs: build
      uses: ./.github/workflows/trivy.yml
      
      with:
        image_name: ${{ needs.build.image_name }}
        image_tag: ${{ needs.build.image_tag  }}

    # Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Push image
    - name: Push Docker image
      run: |
        docker push ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}