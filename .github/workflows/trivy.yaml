name: Trivy Scan

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string

jobs:
  trivy:
    runs-on: ubuntu-latest

    steps:
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.image_name }}:${{ inputs.image_tag }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH