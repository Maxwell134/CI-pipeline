name: Trivy Scan

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
    secrets:
      docker_username:
        required: true

jobs:
  trivy:
    runs-on: ubuntu-latest

    steps:
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.docker_username }}/hello-python:${{ inputs.image_tag }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH